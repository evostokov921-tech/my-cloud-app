apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-cloud-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-cloud-app
  template:
    metadata:
      labels:
        app: my-cloud-app
    spec:
      containers:
      - name: app
        image: my-cloud-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        # --- ДОБАВЬ ЭТОТ БЛОК ---
        envFrom:
        - configMapRef:
            name: my-app-config
        # -------------------------
        
---
apiVersion: v1
kind: Service
metadata:
  name: my-cloud-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: my-cloud-app